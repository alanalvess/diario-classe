server:
  port: ${PORT}

spring:
  application:
    name: ${HOSTNAME}

  config:
    import: optional:configserver:${CONFIG_URL}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: aluno-service
              uri: lb://aluno-service
              predicates:
                - Path=/aluno/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: alunoServiceCircuitBreaker
                    fallbackUri: forward:/fallback/alunoServiceFallBack

            - id: professor-service
              uri: lb://professor-service
              predicates:
                - Path=/professor/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: professorServiceCircuitBreaker
                    fallbackUri: forward:/fallback/professorServiceFallBack

resilience4j:
  circuitbreaker:
    instances:
      alunoServiceCircuitBreaker:
        allow-health-indicator-to-fail: false
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 50s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      professorServiceCircuitBreaker:
        allow-health-indicator-to-fail: false
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 50s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      alunoServiceCircuitBreaker:
        max-attempts: 3
        wait-duration: 10s
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException

      professorServiceCircuitBreaker:
        max-attempts: 3
        wait-duration: 10s
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException

eureka:
  instance:
    hostname: ${HOSTNAME}
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL}

message: Gateway Service is up

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  health:
    diskspace:
      enabled: true
      path: /
      threshold: 10MB

info:
  app:
    name: ${HOSTNAME}
    version: 1.0.0
    description: Gateway Service Application
  svc:
    port: ${server.port}

jwt:
  secret: ${SECRET}
  expiration: ${JWT_EXPIRATION}