version: "3.8"

services:
  database-service:
    image: mysql:8.0
    restart: always
    container_name: database-service
    environment:
      MYSQL_DATABASE: diario-classe
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-mysql-volume:/var/lib/mysql
    networks:
      - servidores
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-service:
    build: configServer
    container_name: config-service
    ports:
      - "8888:8888"
    networks:
      - servidores
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-service:
    build: eurekaServer
    container_name: eureka-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - servidores
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build: gateway
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      eureka-service:
        condition: service_healthy
    networks:
      - servidores
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_URL: http://config-service:8888
      EUREKA_URL: http://eureka-service:8761/eureka/

  user-service:
    build: userService
    container_name: user-service
    ports:
      - "8091:8091"
    depends_on:
      database-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - servidores
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_URL: http://config-service:8888
      EUREKA_URL: http://eureka-service:8761/eureka/
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root

  aluno-service:
    build: alunoService
    container_name: aluno-service
    ports:
      - "8092:8092"
    depends_on:
      database-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - servidores
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_URL: http://config-service:8888
      EUREKA_URL: http://eureka-service:8761/eureka/
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root

  professor-service:
    build: professorService
    container_name: professor-service
    ports:
      - "8093:8093"
    depends_on:
      database-service:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - servidores
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_URL: http://config-service:8888
      EUREKA_URL: http://eureka-service:8761/eureka/
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root

networks:
  servidores:
    driver: bridge

volumes:
  db-mysql-volume: {}
