spring:
  jpa:
    hibernate:
      ddl-auto: update
    database: mysql
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
      jakarta:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE

  datasource:
    url: jdbc:mysql://localhost/db_diarioclasse?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo&useSSl=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Brazil/East
