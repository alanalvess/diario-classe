spring:
  application:
    name: professor-service

eureka:
  instance:
    hostname: professor-service

message: Professor Service is up

info:
  app:
    name: professor-service
    description: Professor Service Application

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED}
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    disable-swagger-default-url: true
    use-root-path: true
  packagesToScan: com.diario.professorservice.controller

jwt:
  secret: ${SECRET}
